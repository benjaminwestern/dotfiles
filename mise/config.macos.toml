# macOS-only dotfiles
[env]
# The vfox gcloud installer disables Google's Python bootstrap but gcloud 576+
# requires Python 3.10 or newer. Use mise's stable shim for install and runtime.
CLOUDSDK_PYTHON = "{{ env.HOME }}/.local/share/mise/shims/python3"

[dotfiles]
"~/.aerospace.toml" = "~/.dotfiles/aerospace/.aerospace.toml"
"~/Brewfile" = "~/.dotfiles/brew/Brewfile"
"~/Library/Application Support/Code/User/keybindings.json" = "~/.dotfiles/vscode/keybindings.json"
"~/Library/Application Support/Code/User/settings.json" = "~/.dotfiles/vscode/settings.json"
"~/Library/Application Support/Code/User/snippets" = "~/.dotfiles/vscode/snippets"

# System packages — macOS (brew)
[bootstrap.packages]
"brew:bash" = "latest"
"brew:git" = "latest"
"brew:tree" = "latest"
"brew:tmux" = "latest"
"brew:fish" = "latest"
"brew:fisher" = "latest"
"brew:neovim" = "latest"
"brew:fastfetch" = "latest"
"brew:graphviz" = "latest"
"brew:lazygit" = "latest"
"brew:hf" = "latest"
"brew:llama.cpp" = "latest"
"brew:jq" = "latest"
"brew:gh" = "latest"
"brew:gitleaks" = "latest"
"brew:zoxide" = "latest"
"brew:fzf" = "latest"
"brew:fd" = "latest"
"brew:ripgrep" = "latest"
"brew:worktrunk" = "latest"
"brew:make" = "latest"
"brew:btop" = "latest"
"brew:nmap" = "latest"
"brew:ykman" = "latest"              # YubiKey Manager CLI
"brew:gnupg" = "latest"              # GPG for OpenPGP applet + ssh-agent
"brew:pinentry-mac" = "latest"       # macOS GPG passphrase entry
"brew:pam-reattach" = "latest"       # Touch ID for sudo inside tmux
"brew:tokei" = "latest"
"brew:caddy" = "latest"
"brew:duckdb" = "latest"
"brew:yt-dlp" = "latest"
"brew:p7zip" = "latest"
"brew:kubernetes-cli" = "latest"
"brew:shellcheck" = "latest"
"brew:automake" = "latest"
"brew:cmake" = "latest"
"brew:gcc" = "latest"
"brew:pkgconf" = "latest"
"brew:protobuf" = "latest"
"brew:wget" = "latest"
"brew:pngpaste" = "latest"
"brew:coreutils" = "latest"
"brew:ffmpeg" = "latest"
"brew:imagemagick" = "latest"
"brew:resvg" = "latest"
"brew:tlrc" = "latest"
"brew:podman" = "latest"
"brew:podman-compose" = "latest"

[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"
