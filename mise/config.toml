min_version = "2026.3.0"

[settings]
experimental = true
dotfiles.default_mode = "symlink"
minimum_release_age_excludes = [
    "npm:opencode-ai",
    "npm:@earendil-works/pi-coding-agent",
    "hk",
    "fnox",
    "pitchfork",
]

[env]
_.file = "~/.config/mise/.env"
EDITOR = "nvim"
OPENCODE_ENABLE_EXPERIMENTAL_MODELS = "true"
OPENCODE_ENABLE_EXA = "1"
PITCHFORK_WEB_PORT = "19876"

[dotfiles]
# Source paths use the flat repo layout (each group at repo root)
# Platform-specific dotfiles (macOS/Windows/Linux-only) live in the
# respective config.{linux,macos,windows}.toml files.
"~/.bash_profile" = "~/.dotfiles/bash/.bash_profile"
"~/.bashrc" = "~/.dotfiles/bash/.bashrc"
"~/.config/fish" = "~/.dotfiles/fish"
"~/.config/gh/config.yml" = "~/.dotfiles/gh/config.yml"
"~/.config/gh/hosts.yml" = "~/.dotfiles/gh/hosts.yml"
"~/.config/ghostty/config" = "~/.dotfiles/ghostty/config"
"~/.config/git/ignore" = "~/.dotfiles/git/ignore"
"~/.config/mise" = "~/.dotfiles/mise"
"~/.config/nvim" = "~/.dotfiles/nvim"
"~/.config/opencode/opencode.json" = "~/.dotfiles/opencode/opencode.json"
"~/.config/opencode/plugins" = "~/.dotfiles/opencode/plugins"
"~/.config/pitchfork/Caddyfile" = "~/.dotfiles/pitchfork/Caddyfile"
"~/.config/pitchfork/config.toml" = "~/.dotfiles/pitchfork/config.toml"
"~/.config/worktrunk/config.toml" = "~/.dotfiles/worktrunk/config.toml"
"~/.hushlogin" = "~/.dotfiles/bash/.hushlogin"
"~/.pi/agent/APPEND_SYSTEM.md" = "~/.dotfiles/pi/APPEND_SYSTEM.md"
"~/.pi/agent/extensions" = "~/.dotfiles/pi/extensions"
"~/.pi/agent/mcp.json" = "~/.dotfiles/pi/mcp.json"
"~/.pi/agent/model-system" = "~/.dotfiles/pi/model-system"
"~/.pi/agent/settings.json" = "~/.dotfiles/pi/settings.json"
"~/.ssh/config" = "~/.dotfiles/ssh/config"
"~/.tmux.conf" = "~/.dotfiles/tmux/.tmux.conf"
"~/.zprofile" = "~/.dotfiles/zsh/.zprofile"
"~/.zshrc" = "~/.dotfiles/zsh/.zshrc"

[tools]
# Go
go = "latest"
"go:golang.org/x/tools/gopls" = { version = "latest" }
"go:github.com/air-verse/air" = { version = "latest" }
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = { version = "latest" }
"go:mvdan.cc/gofumpt" = { version = "latest" }
"go:github.com/charmbracelet/glow" = { version = "latest" }
"go:github.com/charmbracelet/freeze" = { version = "latest" }
"go:github.com/charmbracelet/vhs" = { version = "latest" }
"go:github.com/hashicorp/terraform-mcp-server/cmd/terraform-mcp-server" = { version = "latest" }
"go:oss.terrastruct.com/d2" = { version = "latest" }
"go:github.com/mikefarah/yq/v4" = { version = "latest" }
"go:github.com/swaggo/swag/cmd/swag" = { version = "latest" }
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = { version = "latest" }
"go:github.com/GoogleCloudPlatform/cloud-sql-proxy/v2" = { version = "latest" }

# Cargo
"cargo:stylua" = { version = "latest" }
"cargo:tree-sitter-cli" = { version = "latest" }

# Node / npm
node = "latest"
bun = "latest"
"npm:opencode-ai" = { version = "latest", minimum_release_age = "0s", npm_args = "--ignore-scripts=false" }
"npm:@earendil-works/pi-coding-agent" = { version = "latest", minimum_release_age = "0s" }
"npm:@playwright/cli" = "latest"
"npm:@dataform/cli" = "latest"
"npm:wrangler" = "latest"
"npm:@googleworkspace/cli" = "latest"
"npm:markit-ai" = "latest"
"npm:@kitlangton/ghui" = "latest"
"npm:hunkdiff" = "latest"
"npm:@kitlangton/motel" = "latest"

# Python ecosystem
python = "latest"
uv = "latest"
pipx = "latest"
"pipx:sqlfluff/sqlfluff" = "latest"
"pipx:mitmproxy" = "latest"

# Languages / runtimes
lua = "5.1"
rust = "latest"

# Infrastructure
terraform = "latest"
pitchfork = "latest"
gcloud = "latest"
skaffold = "latest"
pkl = "latest"

# Mise ecosystem
gum = "latest"
hk = "latest"
fnox = "latest"
communique = "latest"
usage = "latest"

[shell_alias]
docker = "podman"
docker-compose = "podman compose"
cls = "clear"
vim = "nvim"
vi = "nvim"
v = "nvim"
python = "python3"
vc = "open $1 -a 'Visual Studio Code'"
opencode-a = "opencode attach http://localhost:4096 --dir ./"
tf = "terraform"
dfc = "dataform compile"
dfr = "dataform run"
dft = "dataform test"
dff = "dataform format"
dfi = "dataform install"
gadc = "gcloud auth application-default login"
gauth = "gcloud auth login"
gsqp = "gcloud auth application-default set-quota-project"
gsgp = "gcloud config set project"
gssa = "gcloud auth activate-service-account"
unsetgsgp = "gcloud config unset project"
gsai = "gcloud config set auth/impersonate_service_account"
unsetgsai = "gcloud config unset auth/impersonate_service_account"
buu = "mise run bundle-update"
rda = "mise run readme-assets"
gsp = "mise run set-gcp-project"
git-pull = "mise run pull-all-repos"
git-check = "mise run check-all-repos"
banish = "mise run banish-ds-store"
git-empty = "mise run empty-commit"
hf-pull = "mise run pull-hf"
llama-serve = "mise run llama-serve"
llama-cli = "mise run llama-cli"
llama-stop = "mise run llama-stop"
ti = "mise run terraform-init"
tc = "mise run terraform-console"
taa = "mise run terraform-auto-apply"
ta = "mise run terraform-apply"
tp = "mise run terraform-plan"

[tasks.bundle-update]
description = "Updates system packages and mise tools"
run = """
mise bootstrap packages upgrade --yes
mise up --yes
mise prune --yes
"""

[tasks.readme-assets]
description = "Regenerates the SVG header assets embedded in the repository READMEs"
run = """
python "$HOME/.dotfiles/Other/repository/generate_readme_banners.py"
"""

[tasks.bootstrap]
description = "Post-bootstrap setup: TPM"
run = """
if [ -e "$HOME/.tmux/plugins/tpm" ] && [ ! -d "$HOME/.tmux/plugins/tpm/.git" ]; then
  printf 'error: %s exists but is not a TPM Git checkout\n' "$HOME/.tmux/plugins/tpm" >&2
  exit 1
fi
if [ ! -d "$HOME/.tmux/plugins/tpm/.git" ]; then
  GIT_CONFIG_GLOBAL=/dev/null git clone https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm"
fi
GIT_CONFIG_GLOBAL=/dev/null "$HOME/.tmux/plugins/tpm/bin/install_plugins"
mkdir -p "$HOME/.local/share/applications"
"""

[tasks.set-gcp-project]
description = "Sets the active Google Cloud project and ADC quota project."
usage = '''
arg "<project_id>" "The Google Cloud Project ID to set."
'''
run = "$HOME/.config/mise/scripts/set_gcp_project.sh {{arg(name='project_id')}}"

[tasks.pull-all-repos]
description = "Uses Git to pull all changes for repositories listed in the $HOME/code directory"
run = "$HOME/.config/mise/scripts/pull_github_status.sh"

[tasks.check-all-repos]
description = "Uses Git to perform a status check for repositories listed in the $HOME/code directory"
run = "$HOME/.config/mise/scripts/check_github_status.sh"

[tasks.banish-ds-store]
description = "Kills DS_Store from current directory and adds it to .gitignore"
dir = "{{cwd}}"
run = """
find . -name .DS_Store -print0 | xargs -0 git rm -f --ignore-unmatch
echo .DS_Store >> .gitignore
git add .gitignore
git commit -m ':fire: .DS_Store banished!'
git push
"""

[tasks.empty-commit]
description = "Pushes and empty commit for CI/CD testing"
dir = "{{cwd}}"
run = """
git add -A
git commit --allow-empty -m ':sparkles: :rocket:'
git push
"""

[tasks.pull-hf]
description = "Download a HuggingFace GGUF model into ~/.models"
usage = '''
arg "<hf_repo>" "HuggingFace repo (e.g. bartowski/gemma-4-e4b-it-GGUF)"
arg "<gguf_file>" "GGUF filename to download"
arg "[model_name]" "Optional local directory name (defaults to filename without .gguf)"
'''
run = "$HOME/.config/mise/scripts/pull-hf.sh {{arg(name='hf_repo')}} {{arg(name='gguf_file')}} {{arg(name='model_name')}}"

[tasks.llama-serve]
description = "Start llama-server for a GGUF model"
usage = '''
arg "<model_path>" "Path to the GGUF model to serve"
arg "[port]" "Port to listen on (default: 4096)"
'''
run = """
llama-server -m "{{arg(name='model_path')}}" --port "{{arg(name='port', default='4096')}}"
"""

[tasks.llama-cli]
description = "Run a single prompt through llama-cli"
usage = '''
arg "<model_path>" "Path to the GGUF model"
arg "<prompt>" "Prompt text"
'''
run = """
llama-cli -m "{{arg(name='model_path')}}" -p "{{arg(name='prompt')}}"
"""

[tasks.llama-stop]
description = "Stop any running llama-server processes"
run = """
pkill -f llama-server || true
"""

[tasks.terraform-init]
description = "Runs Terraform fmt, init and validation"
dir = "{{cwd}}"
run = """
terraform fmt -recursive
terraform init
terraform validate
"""

[tasks.terraform-auto-apply]
depends = ["terraform-init"]
dir = "{{cwd}}"
description = "Runs Terraform Apply without approvals (plus pre-cursor checks)"
run = """
terraform apply --auto-approve
"""

[tasks.terraform-apply]
depends = ["terraform-init"]
dir = "{{cwd}}"
description = "Runs Terraform Apply (plus pre-cursor checks)"
run = """
terraform apply
"""

[tasks.terraform-plan]
depends = ["terraform-init"]
dir = "{{cwd}}"
description = "Runs Terraform plan (plus pre-cursor checks)"
run = """
terraform plan
"""

[tasks.terraform-console]
depends = ["terraform-init"]
dir = "{{cwd}}"
description = "Runs Terraform console (plus pre-cursor checks)"
run = """
terraform console
"""
