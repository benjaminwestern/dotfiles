set -g terminal-features[100] 'xterm*:RGB' # Truecolour for xterm-compatible terminals
set-option -g focus-events on # Enable focus events for mouse support
set -g mouse on # Enable mouse support
set -g extended-keys on
set -g extended-keys-format csi-u

# If Alt/meta keys in Neovim ever feel delayed inside tmux, make the ESC delay explicit.
# set -sg escape-time 10

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# Reorder windows with Shift Left/Right
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# Move between panes
# If these ever conflict with Neovim split navigation, replace this block with
# vim-tmux-navigator in both Neovim and tmux.
# set -g @plugin 'christoomey/vim-tmux-navigator'
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Resize panes
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-k resize-pane -U 5
bind -n C-M-l resize-pane -R 5

set -g @plugin 'dracula/tmux'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @dracula-plugins "cwd time"
set -g @dracula-show-empty-plugins false
set -g @dracula-show-left-icon session
set -g @dracula-time-format "%H:%M %d-%b-%y"
set -g @dracula-show-timezone false

run '~/.tmux/plugins/tpm/tpm'
