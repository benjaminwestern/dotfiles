# Homebrew Tasks
[tasks.bundle-update]
description = "Runs Update, Upgrade, Cleanup and Autoremove for Brew"
run = """
brew update
brew upgrade
brew cleanup
brew autoremove
"""

[tasks.readme-assets]
description = "Regenerates the SVG header assets embedded in the repository READMEs"
run = """
python "$HOME/.dotfiles/Other/repository/generate_readme_banners.py"
"""

# Google Cloud Tasks
[tasks.set-gcp-project]
description = "Sets the active Google Cloud project and ADC quota project."
usage = '''
arg "<project_id>" "The Google Cloud Project ID to set."
'''
run = "$HOME/.config/mise/scripts/set_gcp_project.sh {{arg(name='project_id')}}"

# Git Tasks
[tasks.pull-all-repos]
description = "Uses Git to pull all changes for repositories listed in the $HOME/code directory"
run = "$HOME/.config/mise/scripts/pull_github_status.sh"

[tasks.check-all-repos]
description = "Uses Git to perform a status check for repositories listed in the $HOME/code directory"
run = "$HOME/.config/mise/scripts/check_github_status.sh"

[tasks.banish-ds-store]
description = "Kills DS_Store from current directory and adds it to .gitignore"
dir = "{{cwd}}"
run = """
find . -name .DS_Store -print0 | xargs -0 git rm -f --ignore-unmatch
echo .DS_Store >> .gitignore
git add .gitignore
git commit -m ':fire: .DS_Store banished!'
git push
"""

[tasks.empty-commit]
description = "Pushes and empty commit for CI/CD testing"
dir = "{{cwd}}"
run = """
git add -A
git commit --allow-empty -m ':sparkles: :rocket:'
git push
"""

# Ollama / Local Model Tasks
# Daemon ownership: Homebrew owns starting/stopping/restarting the Ollama server.
# Use native commands for daemon lifecycle:
#   brew services start ollama
#   brew services stop ollama
#   brew services restart ollama
# Mise tasks below only manage model workflows against that server.
[tasks.pull-hf]
description = "Import a HuggingFace GGUF model into Ollama for use with Pi"
usage = '''
arg "<hf_repo>" "HuggingFace repo (e.g. bartowski/gemma-4-e4b-it-GGUF)"
arg "<gguf_file>" "GGUF filename to download"
arg "[ollama_name]" "Optional Ollama model name (defaults to filename)"
'''
run = "$HOME/.config/mise/scripts/pull-hf.sh {{arg(name='hf_repo')}} {{arg(name='gguf_file')}} {{arg(name='ollama_name')}}"

[tasks.ollama-pull-local-models]
description = "Pull configured models; assumes the Homebrew-managed Ollama daemon is running"
run = """
ollama pull "${OLLAMA_GEMMA4_MODEL:-gemma4:e2b-it-q4_K_M}"
ollama pull "${OLLAMA_EMBED_MODEL:-embeddinggemma:300m}"
"""

[tasks.ollama-warm-local-models]
description = "Load configured models; assumes the Homebrew-managed Ollama daemon is running"
run = """
ollama run "${OLLAMA_GEMMA4_MODEL:-gemma4:e2b-it-q4_K_M}" "Reply with OK." --keepalive "${OLLAMA_KEEP_ALIVE:-24h}"
ollama run "${OLLAMA_EMBED_MODEL:-embeddinggemma:300m}" "warmup" --keepalive "${OLLAMA_KEEP_ALIVE:-24h}" >/dev/null
"""

[tasks.ollama-unload-local-models]
description = "Unload the configured local Ollama models"
run = """
ollama stop "${OLLAMA_GEMMA4_MODEL:-gemma4:e2b-it-q4_K_M}" || true
ollama stop "${OLLAMA_EMBED_MODEL:-embeddinggemma:300m}" || true
"""

[tasks.ollama-up]
description = "Pull, warm, and show model status; daemon lifecycle stays with Homebrew"
run = """
ollama pull "${OLLAMA_GEMMA4_MODEL:-gemma4:e2b-it-q4_K_M}"
ollama pull "${OLLAMA_EMBED_MODEL:-embeddinggemma:300m}"
ollama run "${OLLAMA_GEMMA4_MODEL:-gemma4:e2b-it-q4_K_M}" "Reply with OK." --keepalive "${OLLAMA_KEEP_ALIVE:-24h}"
ollama run "${OLLAMA_EMBED_MODEL:-embeddinggemma:300m}" "warmup" --keepalive "${OLLAMA_KEEP_ALIVE:-24h}" >/dev/null
echo ""
echo "Installed models:"
ollama list
echo ""
echo "Loaded models:"
ollama ps
"""

[tasks.ollama-status]
description = "Show configured, installed, and loaded Ollama models"
run = """
echo "Chat model:      ${OLLAMA_GEMMA4_MODEL:-gemma4:e2b-it-q4_K_M}"
echo "Embedding model: ${OLLAMA_EMBED_MODEL:-embeddinggemma:300m}"
echo "Ollama host:     ${OLLAMA_HOST:-127.0.0.1:11434}"
echo "Daemon owner:    Homebrew (brew services start/stop/restart ollama)"
echo ""
if ollama list >/dev/null 2>&1; then
  echo "Installed models:"
  ollama list
  echo ""
  echo "Loaded models:"
  ollama ps
else
  echo "Ollama API is not reachable. Start the daemon with: brew services start ollama"
fi
"""

# Terraform Tasks
[tasks.terraform-init]
description = "Runs Terraform fmt, init and validation"
dir = "{{cwd}}"
run = """
terraform fmt -recursive
terraform init
terraform validate
"""

[tasks.terraform-auto-apply]
depends = ["terraform-init"]
dir = "{{cwd}}"
description = "Runs Terraform Apply without approvals (plus pre-cursor checks)"
run = """
terraform apply --auto-approve
"""

[tasks.terraform-apply]
depends = ["terraform-init"]
dir = "{{cwd}}"
description = "Runs Terraform Apply (plus pre-cursor checks)"
run = """
terraform apply
"""

[tasks.terraform-plan]
depends = ["terraform-init"]
dir = "{{cwd}}"
description = "Runs Terraform plan (plus pre-cursor checks)"
run = """
terraform plan
"""

[tasks.terraform-console]
depends = ["terraform-init"]
dir = "{{cwd}}"
description = "Runs Terraform console (plus pre-cursor checks)"
run = """
terraform console
"""

